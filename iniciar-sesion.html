<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión - RoomMatch</title>

    <link rel="stylesheet" href="iniciar-sesion.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <div class="contenedor-login">
      <div class="login-caja">
        <h1>Iniciar Sesión</h1>
        <p class="subtitulo">Accede a tu cuenta de RoomMatch</p>

        <form>
          <label for="email">Correo electrónico</label>
          <input
            type="email"
            id="email"
            placeholder="Correo electrónico o teléfono"
          />

          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            placeholder="Introduce tu contraseña"
          />

          <button class="boton-login">
            <a href="../perfil/perfil.html">Entrar</a>
          </button>
        </form>

        <p class="registro">
          ¿No tienes cuenta?
          <a href="">Crear cuenta</a>
        </p>
      </div>
    </div>
  </body>
</html>
